<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="4;url=home.html">
    <title>PlanetPulse: Feel the Pulse Act for the Planet 🌍</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, 'Times New Roman', serif;
            background-color: #f8f8e8;
        }

        .splash-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            color: white;
            text-align: center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)), url('CC 03.avif');
            background-size: cover;
            background-position: center;
        }

        .splash-container {
            width: min(700px, 100%);
            padding: 40px 34px;
            background-color: rgba(18, 64, 61, 0.78);
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-radius: 14px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0;
            font-size: 54px;
        }

        .slogan {
            margin: 10px 0 28px;
            font-size: 24px;
            line-height: 1.3;
        }

        .team-box {
            width: fit-content;
            margin: 0 auto 26px;
            padding: 18px 30px;
            background-color: rgba(255, 255, 255, 0.14);
            border-radius: 10px;
        }

        .team-box h2 {
            margin: 0 0 12px;
            font-size: 26px;
        }

        .team-box p {
            margin: 0;
            font-size: 20px;
            line-height: 1.7;
        }

        .loading-text {
            margin: 0 0 14px;
            font-size: 18px;
        }

        .loader {
            width: 52px;
            height: 52px;
            margin: 0 auto;
            border: 6px solid rgba(255, 255, 255, 0.45);
            border-top-color: #f5d84f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            .splash-container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 40px;
            }

            .slogan {
                font-size: 20px;
            }

            .team-box p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <main class="splash-screen">
        <div class="splash-container">
            <img src="logo.png" alt="PlanetPulse logo" class="logo">
            <h1>PlanetPulse 🌍</h1>
            <p class="slogan">Feel the Pulse &amp; Act for the Planet.</p>

            <div class="team-box">
                <h2>Team Members</h2>
                <p>
                    Niveka Wijeratne<br>
                    Dharani Wasundara<br>
                    Hasini Siriwardane<br>
                    Hasindi Eraji
                </p>
            </div>

            <p class="loading-text">Loading home page...</p>
            <div class="loader"></div>
        </div>
    </main>

    <script>
        setTimeout(function () {
            window.location.href = "home.html";
        }, 4000);
    </script>
</body>
</html>
